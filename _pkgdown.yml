url: https://chenweng1991.github.io/redeemR/
template:
  bootstrap: 5
  bootswatch: flatly
  bslib:
    primary: "#2c3e50"
    base_font: {google: "Source Sans 3"}
    heading_font: {google: "Source Sans 3"}
    code_font: {google: "Source Code Pro"}

home:
  title: redeemR
  description: Downstream analysis for REDEEM-V mitochondrial consensus variant calls.

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [github]
  components:
    intro:
      text: Get started
      href: articles/redeemr-workflow.html
    articles:
      text: Articles
      menu:
      - text: redeemR2.0 workflow
        href: articles/redeemr-workflow.html
      - text: Filter2 QC report
        href: articles/filter2-qc.html
      - text: Variant annotation
        href: articles/variant-annotation.html
    reference:
      text: Reference
      href: reference/index.html
    news:
      text: Changelog
      href: news/index.html
    github:
      icon: fab fa-github
      href: https://github.com/chenweng1991/redeemR
      aria-label: GitHub

